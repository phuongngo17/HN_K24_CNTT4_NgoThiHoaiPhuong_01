<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h2 th:text="${artwork.id != null} ? 'Sửa Tác Phẩm' : 'Thêm Tác Phẩm Mới'"></h2>

    <form th:action="@{/add}" method="post" enctype="multipart/form-data">
        <input type="hidden" name="id" th:value="${artwork.id}" />

        <div class="mb-3">
            <label>Tiêu đề</label>
            <input type="text" class="form-control"
                   name="title"
                   th:value="${artwork.title}" required />
        </div>

        <div class="mb-3">
            <label>Nghệ sĩ</label>
            <input type="text" class="form-control"
                   name="artist"
                   th:value="${artwork.artist}" required />
        </div>

        <div class="mb-3">
            <label>Giá</label>
            <input type="number" class="form-control"
                   name="price"
                   th:value="${artwork.price}" />
        </div>

        <div class="mb-3">
            <label>Danh mục</label>
            <select class="form-select" name="category.id">
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${cat.id == artwork?.category?.id}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label>Ngày phát hành</label>
            <input type="date" class="form-control"
                   name="releaseDate"
                   th:value="${artwork.releaseDate}" />
        </div>

        <div class="mb-3">
            <label>Hình ảnh</label>
            <input type="file" class="form-control" name="file" accept="image/*" />
        </div>

        <button type="submit" class="btn btn-success">Lưu</button>
        <a href="/" class="btn btn-secondary">Hủy</a>
    </form>
</div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
