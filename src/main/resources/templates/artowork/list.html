<!doctype html>
<html lang="en">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Danh sách Tác phẩm</h2>
        <a th:href="@{/add}" class="btn btn-primary">+ Thêm mới</a>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-light">
        <tr>
            <th>Hình ảnh</th>
            <th>Tiêu đề</th>
            <th>Nghệ sĩ</th>
            <th>Giá</th>
            <th>Danh mục</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="artwork : ${artworks}">
            <td><img th:src="${artwork.coverImage}" width="80" height="80" style="object-fit: cover;"></td>
            <td th:text="${artwork.title}"></td>
            <td th:text="${artwork.artist}"></td>
            <td th:text="${artwork.price} + ' ₫'"></td>
            <td th:text="${artwork.category?.name}"></td>
            <td>
                <a th:href="@{/detail/{id}(id=${artwork.id})}" class="btn btn-info btn-sm">Chi tiết</a>
                <a th:href="@{/edit/{id}(id=${artwork.id})}" class="btn btn-warning btn-sm">Sửa</a>
                <a th:href="@{/delete/{id}(id=${artwork.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Xác nhận xóa')">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="d-flex justify-content-center mt-4" th:if="${totalPages > 1}">
        <nav>
            <ul class="pagination">
                <li class="page-item" th:if="${currentPage > 0}">
                    <a class="page-link" th:href="@{/?page=${currentPage - 1}}">Trước</a>
                </li>

                <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}" class="page-item">
                    <a class="page-link"
                       th:href="@{/?page=${i}}"
                       th:text="${i + 1}"
                       th:class="${i == currentPage} ? 'active' : ''"></a>
                </li>

                <li class="page-item" th:if="${currentPage < totalPages - 1}">
                    <a class="page-link" th:href="@{/?page=${currentPage + 1}}">Sau</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
