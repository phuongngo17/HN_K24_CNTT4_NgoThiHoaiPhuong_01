<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 th:text="${artwork.title}"></h3>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-5 text-center">
                            <img th:src="${artwork.coverImage}"
                                 class="img-fluid rounded"
                                 style="max-height: 400px; object-fit: contain;">
                        </div>
                        <div class="col-md-7">
                            <table class="table table-borderless">
                                <tr>
                                    <th width="120">Nghệ sĩ:</th>
                                    <td th:text="${artwork.artist}"></td>
                                </tr>
                                <tr>
                                    <th>Giá:</th>
                                    <td th:text="${artwork.price} + ' ₫'"></td>
                                </tr>
                                <tr>
                                    <th>Danh mục:</th>
                                    <td th:text="${artwork.category?.name}"></td>
                                </tr>
                                <tr>
                                    <th>Ngày phát hành:</th>
                                    <td th:text="${artwork.releaseDate}"></td>
                                </tr>
                                <tr>
                                    <th>Trạng thái:</th>
                                    <td>
                                            <span class="badge"
                                                  th:class="${artwork.status} ? 'bg-success' : 'bg-secondary'"
                                                  th:text="${artwork.status} ? 'Đang hiển thị' : 'Ẩn'"></span>
                                    </td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <a th:href="@{/}" class="btn btn-secondary">Quay lại danh sách</a>
                    <a th:href="@{/edit/{id}(id=${artwork.id})}" class="btn btn-warning">Sửa</a>
                    <a th:href="@{/delete/{id}(id=${artwork.id})}"
                       class="btn btn-danger"
                       onclick="return confirm('Xác nhận xóa tác phẩm này?')">Xóa</a>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
